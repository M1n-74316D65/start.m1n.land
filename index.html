<!doctype html>
<meta charset="utf-8" />
<meta name="color-scheme" content="dark light" />
<meta name="robots" content="noindex" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta
  name="theme-color"
  content="#0c0d0d"
  media="(prefers-color-scheme: dark)"
/>
<meta
  name="theme-color"
  content="#f3f4f4"
  media="(prefers-color-scheme: light)"
/>
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta
  name="apple-mobile-web-app-status-bar-style"
  content="black-translucent"
/>
<meta name="apple-mobile-web-app-title" content="M1n Startpage" />
<meta name="application-name" content="M1n Startpage" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/images/favicon-8.png" />
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<title>M1n Startpage</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://hacker-news.firebaseio.com" />
<link
  href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>

<style>
  html {
    background-color: var(--color-background);
    font-family: var(--font-family);
    font-size: var(--font-size);
    line-height: 1.4;
    letter-spacing: var(--letter-spacing);
    overflow-x: hidden;
    scrollbar-width: none;
  }

  html::-webkit-scrollbar {
    display: none;
  }

  body {
    margin: 0;
    overflow-x: hidden;
    scrollbar-width: none;
    background-color: var(--color-background);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 2px,
      var(--color-scanline) 2px,
      var(--color-scanline) 3px
    );
  }

  body::-webkit-scrollbar {
    display: none;
  }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    box-sizing: border-box;
    min-height: 100dvh;
    width: 100vw;
    padding: calc(var(--space) * 2.5) var(--space) calc(var(--space) * 2);
    overflow: hidden;
    position: relative;
    opacity: 0;
    animation: fadeIn 0.5s var(--transition-easing) forwards;
    scrollbar-width: none;
    transition: background-color var(--transition-speed)
      var(--transition-easing);
  }

  main::-webkit-scrollbar {
    display: none;
  }

  .main-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    width: 100%;
    max-width: 40rem;
    gap: var(--space);
  }

  .news-section {
    display: flex;
    justify-content: center;
    width: 100%;
    max-width: 40rem;
    margin: 0 auto;
    padding: 0 var(--space) calc(var(--space) * 2);
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    main {
      animation: none;
      opacity: 1;
    }
  }
</style>

<main>
  <div class="main-content">
    <tabs-component></tabs-component>
    <clock-component></clock-component>
    <commands-component></commands-component>
    <search-component></search-component>
  </div>
</main>

<section class="news-section">
  <news-feed-component></news-feed-component>
</section>

<script type="module" src="/src/main.js"></script>
