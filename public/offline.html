<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - M1n Startpage</title>
    <style>
         :root {
           --bg: #0c0d0d;
           --text: #e8e8e8;
           --muted: #666;
           --accent: #4f46e5;
         }
         @media (prefers-color-scheme: light) {
           :root {
             --bg: #f5f5f5;
             --text: #1a1a1a;
             --muted: #666;
           }
         }
         * { box-sizing: border-box; margin: 0; padding: 0; }
         body {
           font-family: 'IBM Plex Mono', monospace;
           background: var(--bg);
           color: var(--text);
           min-height: 100vh;
           display: flex;
           align-items: center;
           justify-content: center;
           padding: 2rem;
           text-align: center;
         }
         .container {400px; }
      max-width:     h1 {
           font-size: 1.5rem;
           font-weight: 500;
           margin-bottom: 1rem;
           opacity: 0.9;
         }
         p {
           color: var(--muted);
           margin-bottom: 1.5rem;
           line-height: 1.6;
         }
         button {
           font-family: inherit;
           background: var(--accent);
           color: #fff;
           border: none;
           padding: 0.75rem 1.5rem;
           border-radius: 4px;
           cursor: pointer;
           font-size: 0.875rem;
           transition: opacity 0.2s;
         }
         button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You're offline</h1>
      <p>
        It looks like you've lost your internet connection. Some features may
        not be available until you're back online.
      </p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
